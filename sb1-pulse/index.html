<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SB1 Pulse — Tech Intelligence for Sparebank1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --surface-2:    #f7f8fa;
      --border:       rgba(0,0,0,0.07);
      --border-md:    rgba(0,0,0,0.11);
      --navy:         #0d1b3e;
      --orange:       #d4621a;
      --green:        #16a34a;
      --amber:        #d97706;
      --text-1:       #0d1b3e;
      --text-2:       #4a5568;
      --text-3:       #8a94a6;
      --gradient:     linear-gradient(135deg,#9f06ce 0%,#d9236e 50%,#f76824 100%);
      --sidebar-w:    256px;
      --font:         'DM Sans', system-ui, -apple-system, sans-serif;

      /* tag colours */
      --c-ai:         #ede9fe; --c-ai-t:   #5b21b6;
      --c-cloud:      #dbeafe; --c-cloud-t:#1d4ed8;
      --c-security:   #fee2e2; --c-sec-t:  #b91c1c;
      --c-data:       #d1fae5; --c-data-t: #065f46;
      --c-banking:    #fef3c7; --c-bank-t: #92400e;
      --c-automation: #fce7f3; --c-auto-t: #9d174d;
      --c-developer:  #e0f2fe; --c-dev-t:  #075985;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sidebar overlay (mobile) ──────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 150;
    }
    .overlay.visible { display: block; }

    /* ── Sidebar ────────────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 200;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: transform 0.24s ease;
    }

    /* Brand */
    .sb-brand {
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-shrink: 0;
    }

    .sb-badge {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(159,6,206,.3);
    }

    .sb-brand-text { line-height: 1; }
    .sb-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }
    .sb-tagline {
      font-size: 0.65rem;
      color: var(--text-3);
      font-weight: 500;
      margin-top: 2px;
    }

    /* Section */
    .sb-section {
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0;
      flex-shrink: 0;
    }

    .sb-heading {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-3);
      padding: 0.25rem 1.1rem 0.4rem;
    }

    /* Nav item */
    .sb-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.38rem 1.1rem;
      font-size: 0.81rem;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      user-select: none;
    }
    .sb-item:hover { background: var(--surface-2); color: var(--text-1); }
    .sb-item.active {
      background: rgba(13,27,62,.055);
      border-left-color: var(--navy);
      color: var(--navy);
      font-weight: 700;
    }

    .sb-item img {
      width: 15px;
      height: 15px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .sb-count {
      margin-left: auto;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-3);
      background: var(--surface-2);
      padding: 1px 5px;
      border-radius: 999px;
      min-width: 20px;
      text-align: center;
    }

    /* Sidebar footer */
    .sb-footer {
      margin-top: auto;
      padding: 1rem 1.1rem;
      font-size: 0.72rem;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Feed area ──────────────────────────────────────── */
    .feed-area {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Topbar ─────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 54px;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0 1.5rem;
    }

    .hamburger {
      display: none;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-2);
      border-radius: 7px;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .hamburger:hover { background: var(--surface-2); }

    .search-wrap {
      flex: 1;
      max-width: 420px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.44rem 0.75rem 0.44rem 2rem;
      border: 1px solid var(--border-md);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-1);
      font-size: 0.85rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .search-wrap input:focus {
      border-color: var(--navy);
      background: var(--surface);
    }
    .search-wrap input::placeholder { color: var(--text-3); }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.42rem 0.85rem;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .btn-refresh:hover { opacity: 0.88; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.7s linear infinite; }

    .topbar-meta {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Feed ───────────────────────────────────────────── */
    .feed {
      max-width: 740px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1.5rem;
      flex: 1;
    }

    /* ── Feed item ──────────────────────────────────────── */
    .fi {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .fi:hover { background: transparent; }  /* rely on cursor only */

    /* top row: favicon + source + dot + time */
    .fi-top {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.45rem;
    }

    .fi-favicon {
      width: 15px;
      height: 15px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .fi-source {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--orange);
    }

    .fi-dot {
      font-size: 0.55rem;
      color: var(--text-3);
    }

    .fi-time {
      font-size: 0.72rem;
      color: var(--text-3);
    }

    /* body: content + thumbnail */
    .fi-body {
      display: flex;
      gap: 0.875rem;
      align-items: flex-start;
    }

    .fi-content { flex: 1; min-width: 0; }

    .fi-title {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.38;
      color: var(--text-1);
      letter-spacing: -0.015em;
      margin-bottom: 0.3rem;
    }

    /* featured: first item gets slightly bigger title */
    .fi.fi-featured .fi-title {
      font-size: 1.08rem;
      letter-spacing: -0.02em;
    }

    .fi-excerpt {
      font-size: 0.8rem;
      color: var(--text-2);
      line-height: 1.62;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .fi-featured .fi-excerpt { -webkit-line-clamp: 3; }

    /* thumbnail */
    .fi-thumb-wrap {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface-2);
    }
    .fi-featured .fi-thumb-wrap {
      width: 96px;
      height: 96px;
    }
    .fi-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* footer: tags + relevance */
    .fi-footer {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.55rem;
      flex-wrap: wrap;
    }

    .tag {
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.025em;
      text-transform: uppercase;
    }
    .tag-ai         { background: var(--c-ai);         color: var(--c-ai-t); }
    .tag-cloud      { background: var(--c-cloud);      color: var(--c-cloud-t); }
    .tag-security   { background: var(--c-security);   color: var(--c-sec-t); }
    .tag-data       { background: var(--c-data);       color: var(--c-data-t); }
    .tag-banking    { background: var(--c-banking);    color: var(--c-bank-t); }
    .tag-automation { background: var(--c-automation); color: var(--c-auto-t); }
    .tag-developer  { background: var(--c-developer);  color: var(--c-dev-t); }

    .rel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: auto;
    }
    .rel-high   { background: #22c55e; }
    .rel-medium { background: #f59e0b; }
    .rel-low    { background: var(--border-md); }

    /* ── Skeletons ──────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .sk {
      background: linear-gradient(90deg,var(--bg) 25%,#e4e6ed 50%,var(--bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 5px;
    }
    .sk-row {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* ── Empty / Error ──────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-3);
    }
    .empty h3 { font-size: 1rem; color: var(--text-2); margin-bottom: 0.4rem; font-weight: 600; }
    .empty p  { font-size: 0.85rem; }

    /* ── Page footer ────────────────────────────────────── */
    .page-footer {
      text-align: center;
      padding: 2rem 1rem 3rem;
      font-size: 0.78rem;
      color: var(--text-3);
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.12); }
      .feed-area { margin-left: 0; }
      .hamburger { display: flex; }
      .topbar-meta { display: none; }
      .feed { padding: 0 0.875rem; }
      .topbar { padding: 0 0.875rem; }
      .fi-thumb-wrap { width: 60px; height: 60px; }
      .fi-featured .fi-thumb-wrap { width: 70px; height: 70px; }
    }

    @media (max-width: 440px) {
      .fi-thumb-wrap { display: none; }
    }
  </style>
</head>
<body>

<!-- Mobile overlay -->
<div class="overlay" id="overlay"></div>

<!-- ── Sidebar ───────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-badge">S1</div>
    <div class="sb-brand-text">
      <div class="sb-name">SB1 Pulse</div>
      <div class="sb-tagline">Sparebank1 tech brief</div>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-heading">Sources</div>
    <div id="sourceList"></div>
  </div>

  <div class="sb-section">
    <div class="sb-heading">Topics</div>
    <div id="topicList"></div>
  </div>

  <div class="sb-footer">made with ❤️ by Daniel Andersen and Claude</div>
</aside>

<!-- ── Feed area ─────────────────────────────────────── -->
<div class="feed-area">

  <!-- Topbar -->
  <div class="topbar">
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search articles…" autocomplete="off" />
    </div>

    <button class="btn-refresh" id="refreshBtn">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>

    <span class="topbar-meta" id="metaText">Loading…</span>
  </div>

  <!-- Feed -->
  <div class="feed" id="feed"></div>

  <div class="page-footer" id="pageFooter" style="display:none">made with ❤️ by Daniel Andersen and Claude</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────

const TAG_LABELS = {
  ai:         'AI & ML',
  cloud:      'Cloud',
  security:   'Security',
  data:       'Data',
  banking:    'Banking',
  automation: 'Automation',
  developer:  'Developer',
};

const SOURCE_META = {
  microsoft:  { label: 'Microsoft',     domain: 'microsoft.com' },
  aws:        { label: 'Amazon / AWS',  domain: 'aws.amazon.com' },
  google:     { label: 'Google',        domain: 'google.com' },
  openai:     { label: 'OpenAI',        domain: 'openai.com' },
  anthropic:  { label: 'Anthropic',     domain: 'anthropic.com' },
  servicenow: { label: 'ServiceNow',    domain: 'servicenow.com' },
  salesforce: { label: 'Salesforce',    domain: 'salesforce.com' },
  sap:        { label: 'SAP',           domain: 'sap.com' },
  meta:       { label: 'Meta',          domain: 'meta.com' },
  ibm:        { label: 'IBM',           domain: 'ibm.com' },
  nvidia:     { label: 'NVIDIA',        domain: 'nvidia.com' },
  github:     { label: 'GitHub',        domain: 'github.com' },
};

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────

let allArticles  = [];
let activeSource = 'all';
let activeTopic  = 'all';
let searchQuery  = '';

// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const s = (Date.now() - d) / 1000;
  if (s < 60)    return 'just now';
  if (s < 3600)  return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  if (s < 604800) return `${Math.floor(s / 86400)}d ago`;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function relClass(r) {
  return r >= 20 ? 'rel-high' : r >= 8 ? 'rel-medium' : 'rel-low';
}

function esc(s = '') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function faviconUrl(category) {
  const m = SOURCE_META[category];
  return m ? `https://www.google.com/s2/favicons?domain=${m.domain}&sz=32` : '';
}

// ─────────────────────────────────────────────────────────────
// Data loading
// ─────────────────────────────────────────────────────────────

async function loadData() {
  const btn  = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.classList.add('spin');
  document.getElementById('metaText').textContent = 'Loading…';
  document.getElementById('feed').innerHTML = skelItems(10);

  try {
    const res  = await fetch('./articles.json?_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allArticles = data.articles || [];

    const gen = new Date(data.generated);
    const dateStr = gen.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    const timeStr = gen.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('metaText').textContent =
      `${allArticles.length} articles · ${dateStr} ${timeStr} UTC`;

    buildSidebar();
    renderFeed();

  } catch (e) {
    document.getElementById('feed').innerHTML =
      `<div class="empty"><h3>Could not load articles</h3><p>${esc(e.message)}</p></div>`;
    document.getElementById('metaText').textContent = 'Error';
  }

  btn.disabled = false;
  icon.classList.remove('spin');
}

// ─────────────────────────────────────────────────────────────
// Sidebar
// ─────────────────────────────────────────────────────────────

function buildSidebar() {
  // Count per source category
  const srcCounts = {};
  allArticles.forEach(a => {
    srcCounts[a.category] = (srcCounts[a.category] || 0) + 1;
  });

  // Count per topic tag
  const tagCounts = {};
  allArticles.forEach(a => {
    (a.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; });
  });

  // Visible = filtered list length
  const visCount = filtered().length;

  // Sources
  const srcItems = Object.entries(SOURCE_META)
    .filter(([k]) => srcCounts[k] > 0)
    .sort((a, b) => (srcCounts[b[0]] || 0) - (srcCounts[a[0]] || 0));

  document.getElementById('sourceList').innerHTML = [
    sbItem('all', 'source', 'All sources', null, allArticles.length),
    ...srcItems.map(([k, m]) => sbItem(k, 'source', m.label, faviconUrl(k), srcCounts[k])),
  ].join('');

  // Topics
  const topicItems = Object.entries(TAG_LABELS)
    .filter(([k]) => tagCounts[k] > 0)
    .sort((a, b) => (tagCounts[b[0]] || 0) - (tagCounts[a[0]] || 0));

  document.getElementById('topicList').innerHTML = [
    sbItem('all', 'topic', 'All topics', null, null),
    ...topicItems.map(([k, label]) => sbItem(k, 'topic', label, null, tagCounts[k])),
  ].join('');

  // Wire events
  document.querySelectorAll('[data-src]').forEach(el => {
    el.addEventListener('click', () => {
      activeSource = el.dataset.src;
      buildSidebar();
      renderFeed();
      closeSidebar();
    });
  });
  document.querySelectorAll('[data-topic]').forEach(el => {
    el.addEventListener('click', () => {
      activeTopic = el.dataset.topic;
      buildSidebar();
      renderFeed();
      closeSidebar();
    });
  });
}

function sbItem(key, type, label, iconUrl, count) {
  const isActive = type === 'source' ? activeSource === key : activeTopic === key;
  const attr     = type === 'source' ? `data-src="${esc(key)}"` : `data-topic="${esc(key)}"`;
  const icon     = iconUrl
    ? `<img src="${esc(iconUrl)}" alt="" onerror="this.style.display='none'">`
    : '';
  const badge    = count != null
    ? `<span class="sb-count">${count}</span>`
    : '';
  return `<div class="sb-item${isActive ? ' active' : ''}" ${attr}>${icon}<span>${esc(label)}</span>${badge}</div>`;
}

// ─────────────────────────────────────────────────────────────
// Filtering
// ─────────────────────────────────────────────────────────────

function filtered() {
  let list = allArticles;
  if (activeSource !== 'all') list = list.filter(a => a.category === activeSource);
  if (activeTopic  !== 'all') list = list.filter(a => (a.tags || []).includes(activeTopic));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(a =>
      (a.title   || '').toLowerCase().includes(q) ||
      (a.summary || '').toLowerCase().includes(q) ||
      (a.source  || '').toLowerCase().includes(q)
    );
  }
  return list;
}

// ─────────────────────────────────────────────────────────────
// Rendering
// ─────────────────────────────────────────────────────────────

function renderFeed() {
  const list = filtered();
  const feed = document.getElementById('feed');

  if (list.length === 0) {
    feed.innerHTML = `<div class="empty"><h3>No articles found</h3><p>Try a different source, topic, or search term.</p></div>`;
    return;
  }

  feed.innerHTML = list.map((a, i) => renderItem(a, i === 0)).join('');
}

function renderItem(a, featured) {
  const fav   = faviconUrl(a.category);
  const favEl = fav
    ? `<img class="fi-favicon" src="${esc(fav)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '';

  const thumb = a.image
    ? `<div class="fi-thumb-wrap">
         <img class="fi-thumb" src="${esc(a.image)}" alt="" loading="lazy"
              onerror="this.closest('.fi-thumb-wrap').remove()">
       </div>`
    : '';

  const tags = (a.tags || [])
    .map(t => `<span class="tag tag-${t}">${esc(TAG_LABELS[t] || t)}</span>`)
    .join('');

  return `
<a class="fi${featured ? ' fi-featured' : ''}"
   href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">
  <div class="fi-top">
    ${favEl}
    <span class="fi-source">${esc(a.source)}</span>
    <span class="fi-dot">·</span>
    <span class="fi-time">${timeAgo(a.date)}</span>
  </div>
  <div class="fi-body">
    <div class="fi-content">
      <div class="fi-title">${esc(a.title)}</div>
      ${a.summary ? `<div class="fi-excerpt">${esc(a.summary)}</div>` : ''}
    </div>
    ${thumb}
  </div>
  <div class="fi-footer">
    ${tags}
    <span class="rel-dot ${relClass(a.relevance)}" title="Relevance: ${a.relevance}/100"></span>
  </div>
</a>`;
}

// ─────────────────────────────────────────────────────────────
// Skeletons
// ─────────────────────────────────────────────────────────────

function skelItems(n) {
  return Array.from({ length: n }, (_, i) => `
<div class="sk-row">
  <div style="display:flex;gap:.4rem;align-items:center">
    <div class="sk" style="width:15px;height:15px;border-radius:3px"></div>
    <div class="sk" style="width:${70 + (i % 3) * 25}px;height:10px"></div>
    <div class="sk" style="width:40px;height:10px"></div>
  </div>
  <div style="display:flex;gap:.875rem">
    <div style="flex:1;display:flex;flex-direction:column;gap:.4rem">
      <div class="sk" style="height:14px;width:${85 - (i % 4) * 10}%"></div>
      <div class="sk" style="height:14px;width:${70 + (i % 3) * 8}%"></div>
      <div class="sk" style="height:10px;width:90%"></div>
      <div class="sk" style="height:10px;width:75%"></div>
    </div>
    ${i % 3 !== 0 ? `<div class="sk" style="width:72px;height:72px;border-radius:8px;flex-shrink:0"></div>` : ''}
  </div>
</div>`).join('');
}

// ─────────────────────────────────────────────────────────────
// Sidebar drawer (mobile)
// ─────────────────────────────────────────────────────────────

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closeSidebar() {
  if (window.innerWidth >= 768) return;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

document.getElementById('hamburger').addEventListener('click', openSidebar);
document.getElementById('overlay').addEventListener('click', closeSidebar);

// ─────────────────────────────────────────────────────────────
// Events
// ─────────────────────────────────────────────────────────────

document.getElementById('refreshBtn').addEventListener('click', loadData);

document.getElementById('searchInput').addEventListener('input', function () {
  searchQuery = this.value.trim();
  renderFeed();
});

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────

loadData();
</script>

</body>
</html>
